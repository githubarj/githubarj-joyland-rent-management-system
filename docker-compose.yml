version: '3.9'

networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  jenkins_home:

services:

  jenkins:
    build:
      context: .
      dockerfile: docker/jenkins/Dockerfile
    user: root
    restart: unless-stopped          # ← missing
    ports:
      - "8080:8080"                  # ← missing
      - "50000:50000"                # ← missing
    networks:
      - backend-network              # ← missing (can't talk to other services)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - jenkins_home:/var/jenkins_home  # ← missing (you'll lose data on restart!)


  db:
    image: postgres:15-alpine

    restart: unless-stopped
    volumes:

      - postgres_data:/var/lib/postgresql/data
      # Run any SQL files on first startup
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      # host:container

      - "5432:5432"
    networks:
      - backend-network
    # Health check: other services wait for this before starting
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5       # try 5 times before giving up

  # ─── Redis Cache ───────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5


# ─── Django Backend ────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
      target: development
    restart: unless-stopped
    # Mount local code into container
    # Changes you make on your machine
    # immediately reflect in the container
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env    # loads all env vars from file
    environment:
      # Override specific vars
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      # Don't start until db is healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-network

  # ─── React Frontend ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
      target: development
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      # This is important!
      # Without this, the container's node_modules
      # would be overwritten by the host volume mount
      # (host likely doesn't have node_modules)
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
      # Needed for hot reload to work inside Docker
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
    depends_on:
      - backend
    networks:
      - backend-network
