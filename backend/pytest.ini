[pytest]
DJANGO_SETTINGS_MODULE = server_joyland.settings_test
pythonpath = backend
python_files = tests.py test_*.py *_tests.py

# ==============================================================================
# 🎯 SILENCE THE NOISE: Clean up deprecations and disable raw system file dumps
# ==============================================================================
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::django.utils.deprecation.RemovedInDjango60Warning

log_cli = false
log_file = /dev/null
