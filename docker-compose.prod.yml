version: '3.9'

networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  static_volume:    # Django static files shared between backend + nginx
  media_volume:     # User uploaded files

services:

  jenkins:
    image: jenkins/jenkins:lts
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker

  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    # NO port exposure in production!
    # Only accessible within Docker network
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    # Password protect redis in production
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - backend-network

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:${IMAGE_TAG:-latest}
    restart: always
    volumes:
      # Share static files with nginx
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    # NO port exposure - nginx talks to this internally
    networks:
      - backend-network
    # Run migrations before starting
    # then collect static files
    # then start gunicorn
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers 3
             --timeout 120"

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:${IMAGE_TAG:-latest}
    restart: always
    depends_on:
      - backend
    networks:
      - backend-network
    # Only nginx is exposed to the outside world

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      # The ONLY thing exposed to the internet
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      # SSL certificates (from Let's Encrypt)
      - ./docker/nginx/ssl:/etc/nginx/ssl
      # Access Django static files
      - static_volume:/django-static
      - media_volume:/media
    depends_on:
      - frontend
      - backend
    networks:
      - backend-network
